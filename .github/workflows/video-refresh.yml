name: Video Refresh

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run task
        env:
          JSONBIN_API_KEY: ${{ secrets.JSONBIN_API_KEY }}
          JSONBIN_ID_SUBS: ${{ secrets.JSONBIN_ID_SUBS }}
          APP_API_URL: ${{ secrets.APP_API_URL }}
          APP_API_TOKEN: ${{ secrets.APP_API_TOKEN }}
